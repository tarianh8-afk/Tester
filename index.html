<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NOVA SYNDICATE | ELITE</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;700&family=Space+Grotesk:wght@300;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #ff2d95; /* The "Light it up" Pink */
            --bg: #08080c;
            --glass: rgba(255, 255, 255, 0.03);
            --border: rgba(255, 255, 255, 0.08);
            --text-dim: #94a3b8;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background-color: var(--bg);
            color: white;
            font-family: 'Inter', sans-serif;
            overflow-x: hidden;
            line-height: 1.5;
        }

        /* --- PROFESSIONAL BACKGROUND ANIMATION --- */
        .bg-animate {
            position: fixed;
            inset: 0;
            z-index: -1;
            background: 
                radial-gradient(circle at 50% 50%, rgba(255, 45, 149, 0.05) 0%, transparent 50%),
                linear-gradient(var(--border) 1px, transparent 1px) 0 0 / 50px 50px,
                linear-gradient(90deg, var(--border) 1px, transparent 1px) 0 0 / 50px 50px;
            mask-image: radial-gradient(ellipse at center, black, transparent 80%);
        }

        /* --- HEADER --- */
        nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1.5rem 5%;
            border-bottom: 1px solid var(--border);
            backdrop-filter: blur(10px);
            position: sticky;
            top: 0; z-index: 100;
        }

        .logo {
            font-family: 'Space Grotesk', sans-serif;
            font-weight: 700;
            letter-spacing: 2px;
            font-size: 1.1rem;
            text-transform: uppercase;
        }

        .logo span { color: var(--primary); }

        .nav-links { display: flex; gap: 2rem; }
        .nav-links a {
            text-decoration: none;
            color: var(--text-dim);
            font-size: 0.8rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: 0.3s;
        }
        .nav-links a:hover { color: white; }

        /* --- MAIN HERO --- */
        main {
            padding: 100px 5% 50px;
            max-width: 1200px;
            margin: 0 auto;
            min-height: 80vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .kicker {
            font-family: 'Space Grotesk', sans-serif;
            color: var(--primary);
            font-size: 0.75rem;
            letter-spacing: 5px;
            text-transform: uppercase;
            margin-bottom: 1rem;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .kicker::before { content: ''; width: 30px; height: 1px; background: var(--primary); }

        h1 {
            font-family: 'Space Grotesk', sans-serif;
            font-size: clamp(3rem, 10vw, 7.5rem);
            font-weight: 700;
            line-height: 0.9;
            letter-spacing: -3px;
            margin-bottom: 1.5rem;
        }

        .slogan {
            font-size: clamp(1rem, 3vw, 1.5rem);
            font-weight: 300;
            color: var(--text-dim);
            max-width: 600px;
            margin-bottom: 3rem;
            border-left: 2px solid var(--primary);
            padding-left: 20px;
        }

        /* --- BUTTONS (GLASS STYLE) --- */
        .actions { display: flex; gap: 1rem; flex-wrap: wrap; }

        .btn {
            padding: 1.2rem 2.8rem;
            font-size: 0.85rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 2px;
            text-decoration: none;
            transition: all 0.4s cubic-bezier(0.165, 0.84, 0.44, 1);
            border-radius: 2px;
        }

        .btn-main {
            background: white;
            color: black;
            border: 1px solid white;
        }

        .btn-main:hover {
            background: transparent;
            color: white;
            box-shadow: 0 0 30px rgba(255, 255, 255, 0.2);
        }

        .btn-sec {
            background: var(--glass);
            color: white;
            border: 1px solid var(--border);
            backdrop-filter: blur(5px);
        }

        .btn-sec:hover {
            border-color: var(--primary);
            color: var(--primary);
        }

        /* --- HUD FOOTER --- */
        footer {
            border-top: 1px solid var(--border);
            padding: 2rem 5%;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 2rem;
            background: rgba(0,0,0,0.3);
        }

        .stat-box p {
            font-size: 0.65rem;
            text-transform: uppercase;
            color: var(--text-dim);
            letter-spacing: 2px;
            margin-bottom: 5px;
        }

        .stat-box h4 {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 1.2rem;
        }

        .stat-box span { color: var(--primary); }

        /* --- MOBILE OPTIMIZATION --- */
        @media (max-width: 768px) {
            .nav-links { display: none; }
            main { padding-top: 60px; }
            h1 { letter-spacing: -1px; }
            .btn { width: 100%; text-align: center; }
        }
    </style>
</head>
<body>

    <div class="bg-animate"></div>

    <nav>
        <div class="logo">NOVA <span>//</span> SYNDICATE</div>
        <div class="nav-links">
            <a href="#">Intelligence</a>
            <a href="#">Network</a>
            <a href="#">Archive</a>
        </div>
    </nav>

    <main>
        <div class="kicker">Authorized Personnel Only</div>
        <h1>NOVA<br>SYNDICATE</h1>
        <p class="slogan">We don’t play the game — <b>we light it up.</b></p>
        
        <div class="actions">
            <a href="#" class="btn btn-main">Initialize Join</a>
            <a href="#" class="btn btn-sec">Roster Database</a>
        </div>
    </main>

    <footer>
        <div class="stat-box">
            <p>Connection</p>
            <h4>Status: <span>Encrypted</span></h4>
        </div>
        <div class="stat-box">
            <p>Active Agents</p>
            <h4>1,240 <span>Online</span></h4>
        </div>
        <div class="stat-box">
            <p>Local Time</p>
            <h4 id="clock">00:00:00</h4>
        </div>
    </footer>

    <script>
        // Professional Touch: Live HUD Clock
        function updateClock() {
            const now = new Date();
            document.getElementById('clock').innerText = now.toLocaleTimeString();
        }
        setInterval(updateClock, 1000);
        updateClock();
    </script>

</body>
</html>
