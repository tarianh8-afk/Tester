<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nova Syndicate | Rising Team</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        :root {
            --primary: #ff2d95;
            --secondary: #9d50bb;
            --bg-dark: #050505;
            --grid-color: rgba(255, 45, 149, 0.05);
        }

        body, html {
            margin: 0;
            padding: 0;
            background-color: var(--bg-dark);
            color: white;
            font-family: 'Segoe UI', sans-serif;
            overflow-x: hidden;
            height: 100%;
        }

        /* Animated Grid Background */
        .background {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: 
                linear-gradient(var(--grid-color) 1px, transparent 1px),
                linear-gradient(90deg, var(--grid-color) 1px, transparent 1px);
            background-size: 50px 50px;
            z-index: -1;
            mask-image: radial-gradient(circle, black, transparent 80%);
        }

        /* Nav Bar */
        nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 2rem 10%;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .logo {
            font-weight: 900;
            font-size: 1.5rem;
            background: linear-gradient(to right, var(--primary), var(--secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .nav-links a {
            color: #64748b;
            text-decoration: none;
            margin-left: 2rem;
            font-size: 0.9rem;
            transition: 0.3s;
        }

        .nav-links a.active, .nav-links a:hover {
            color: white;
            border-bottom: 2px solid var(--primary);
            padding-bottom: 5px;
        }

        /* Hero Section */
        .hero {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            height: 70vh;
            padding: 0 20px;
        }

        .badge {
            border: 1px solid rgba(255, 45, 149, 0.3);
            padding: 5px 20px;
            border-radius: 4px;
            font-size: 0.7rem;
            letter-spacing: 4px;
            color: var(--primary);
            margin-bottom: 2rem;
            text-transform: uppercase;
        }

        h1 {
            font-size: 5rem;
            margin: 0;
            text-transform: uppercase;
            line-height: 0.9;
            background: linear-gradient(to bottom, #fff 30%, var(--secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 0 20px rgba(157, 80, 187, 0.4));
        }

        .description {
            color: #94a3b8;
            max-width: 500px;
            margin-top: 1.5rem;
            font-size: 1.1rem;
            line-height: 1.6;
        }

        /* Buttons */
        .btn-container {
            margin-top: 3rem;
            display: flex;
            gap: 20px;
        }

        .btn-primary {
            background: linear-gradient(45deg, var(--primary), var(--secondary));
            border: none;
            padding: 15px 40px;
            color: white;
            text-transform: uppercase;
            font-weight: bold;
            border-radius: 5px;
            cursor: pointer;
            letter-spacing: 2px;
            transition: transform 0.2s;
        }

        .btn-outline {
            background: transparent;
            border: 1px solid #1e293b;
            padding: 15px 40px;
            color: white;
            text-transform: uppercase;
            font-weight: bold;
            border-radius: 5px;
            cursor: pointer;
            letter-spacing: 2px;
            transition: 0.3s;
        }

        .btn-outline:hover {
            border-color: var(--secondary);
            background: rgba(157, 80, 187, 0.1);
        }

        /* Footer Stats */
        .footer-stats {
            position: absolute;
            bottom: 40px;
            width: 100%;
            display: flex;
            justify-content: center;
            gap: 40px;
            font-size: 0.8rem;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        .stat-item { display: flex; align-items: center; gap: 8px; }
        .dot { width: 8px; height: 8px; border-radius: 50%; }
        .dot.green { background: #22c55e; box-shadow: 0 0 10px #22c55e; }
        .dot.yellow { background: #eab308; box-shadow: 0 0 10px #eab308; }
        .stat-label { color: #64748b; }

        @media (max-width: 768px) {
            h1 { font-size: 3rem; }
            .footer-stats { flex-direction: column; align-items: center; gap: 10px; bottom: 20px; }
        }
    </style>
</head>
<body>

    <div class="background"></div>

    <nav>
        <div class="logo">NOVA SYNDICATE</div>
        <div class="nav-links">
            <a href="#" class="active">Home</a>
            <a href="#">Team</a>
            <a href="#">Status</a>
        </div>
    </nav>

    <div class="hero">
        <div class="badge">✦ Official Network</div>
        <h1>NOVA<br>SYNDICATE</h1>
        <p class="description">Welcome to Nova Syndicate. We are a rising team with a vision.</p>
        
        <div class="btn-container">
            <button class="btn-primary" onclick="window.location.href='YOUR_DISCORD_LINK'">Join Discord</button>
            <button class="btn-outline">Our Team</button>
        </div>
    </div>

    <div class="footer-stats">
        <div class="stat-item">
            <div class="dot green"></div>
            <span class="stat-label">Discord</span> <strong>Online</strong>
        </div>
        <div class="stat-item">
            <div class="dot yellow"></div>
            <span class="stat-label">Team</span> <strong>10 Members</strong>
        </div>
        <div class="stat-item">
            <div class="dot green"></div>
            <span class="stat-label">Social</span> <strong>TikTok Active</strong>
        </div>
    </div>

</body>
</html>
