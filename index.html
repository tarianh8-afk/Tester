<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NOVA SYNDICATE</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&family=Space+Grotesk:wght@700&display=swap" rel="stylesheet">
    <style>
        /* Essential Reset */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #050508; /* Deep Midnight */
            color: #ffffff;
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            overflow-x: hidden;
        }

        /* High-Performance Static Grid (Won't crash phones) */
        .bg-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: 
                linear-gradient(rgba(255, 45, 149, 0.05) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255, 45, 149, 0.05) 1px, transparent 1px);
            background-size: 40px 40px;
            z-index: 0;
            pointer-events: none;
        }

        /* Layout Container */
        .container {
            position: relative;
            z-index: 10;
            width: 100%;
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 20px;
            flex: 1;
            display: flex;
            flex-direction: column;
        }

        /* Navigation */
        nav {
            height: 80px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .logo {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 1.2rem;
            letter-spacing: 2px;
            font-weight: 700;
        }

        .logo span { color: #ff2d95; }

        /* Hero Content */
        main {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 60px 0;
        }

        .kicker {
            color: #ff2d95;
            text-transform: uppercase;
            letter-spacing: 5px;
            font-size: 0.7rem;
            margin-bottom: 20px;
            font-weight: 700;
        }

        h1 {
            font-family: 'Space Grotesk', sans-serif;
            font-size: clamp(2.8rem, 12vw, 6.5rem);
            line-height: 0.9;
            margin-bottom: 20px;
            text-transform: uppercase;
        }

        .slogan {
            font-size: clamp(1rem, 4vw, 1.4rem);
            color: #94a3b8;
            max-width: 600px;
            margin-bottom: 40px;
        }

        /* Buttons - High Visibility Fix */
        .btn-container {
            display: flex;
            gap: 15px;
            width: 100%;
            max-width: 450px;
            justify-content: center;
        }

        .btn {
            display: block;
            padding: 18px 30px;
            text-decoration: none;
            font-weight: 700;
            font-size: 0.8rem;
            letter-spacing: 2px;
            text-transform: uppercase;
            border-radius: 4px;
            transition: 0.3s;
            flex: 1;
            text-align: center;
        }

        .btn-primary {
            background-color: #ffffff;
            color: #000000;
            border: 1px solid #ffffff;
        }

        .btn-secondary {
            background-color: rgba(255, 255, 255, 0.05);
            color: #ffffff;
            border: 1px solid rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(5px);
        }

        /* Status Footer */
        footer {
            padding: 30px 0;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            display: flex;
            justify-content: space-around;
            font-size: 0.7rem;
            color: #64748b;
        }

        .stat b { color: #ff2d95; }

        /* Responsive stacking for Mobile */
        @media (max-width: 600px) {
            .btn-container {
                flex-direction: column;
                padding: 0 20px;
            }
            .btn {
                width: 100%;
            }
            footer {
                flex-direction: column;
                align-items: center;
                gap: 10px;
            }
        }
    </style>
</head>
<body>

    <div class="bg-overlay"></div>

    <div class="container">
        <nav>
            <div class="logo">NOVA <span>//</span> SYNDICATE</div>
            <div style="font-size: 0.7rem; opacity: 0.5;">v4.0 STABLE</div>
        </nav>

        <main>
            <p class="kicker">Connection Established</p>
            <h1>NOVA<br>SYNDICATE</h1>
            <p class="slogan">We don’t play the game — <b>we light it up.</b></p>
            
            <div class="btn-container">
                <a href="#" class="btn btn-primary">Join Discord</a>
                <a href="#" class="btn btn-secondary">Our Team</a>
            </div>
        </main>

        <footer>
            <div class="stat">NETWORK: <b>ENCRYPTED</b></div>
            <div class="stat">SQUAD: <b>1.2K ACTIVE</b></div>
            <div class="stat">REGION: <b>GLOBAL</b></div>
        </footer>
    </div>

</body>
</html>
