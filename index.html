<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NOVA SYNDICATE // LIGHT IT UP</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&family=Rajdhani:wght@500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #ff2d95;
            --secondary: #9d50bb;
            --accent: #00f2ff;
            --bg: #050508;
            --grid: rgba(157, 80, 187, 0.15);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background-color: var(--bg);
            color: white;
            font-family: 'Rajdhani', sans-serif;
            overflow-x: hidden;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* --- CYBERPUNK BACKGROUND ELEMENTS --- */
        .scanlines {
            position: fixed;
            inset: 0;
            background: linear-gradient(to bottom, transparent 50%, rgba(0, 0, 0, 0.4) 50%);
            background-size: 100% 4px;
            z-index: 10;
            pointer-events: none;
        }

        .grid-floor {
            position: fixed;
            bottom: -200px;
            left: -50%;
            width: 200%;
            height: 80%;
            background-image: 
                linear-gradient(var(--grid) 1px, transparent 1px),
                linear-gradient(90deg, var(--grid) 1px, transparent 1px);
            background-size: 60px 60px;
            transform: rotateX(65deg);
            animation: moveGrid 20s linear infinite;
            z-index: 1;
        }

        @keyframes moveGrid {
            from { background-position: 0 0; }
            to { background-position: 0 100%; }
        }

        /* --- NAVIGATION --- */
        nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 2rem 5%;
            z-index: 100;
        }

        .logo {
            font-family: 'Orbitron', sans-serif;
            font-weight: 900;
            font-size: 1.2rem;
            letter-spacing: 3px;
            background: linear-gradient(to right, var(--primary), var(--secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .nav-links { display: flex; gap: 2rem; }
        .nav-links a {
            text-decoration: none;
            color: #64748b;
            font-weight: 700;
            text-transform: uppercase;
            font-size: 0.8rem;
            letter-spacing: 2px;
            transition: 0.3s;
        }

        .nav-links a:hover, .active { color: white; border-bottom: 2px solid var(--primary); }

        /* --- HERO CONTENT --- */
        .hero {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 0 5%;
            z-index: 20;
        }

        .badge {
            font-family: 'Orbitron', sans-serif;
            border: 1px solid var(--primary);
            color: var(--primary);
            padding: 5px 15px;
            font-size: 0.65rem;
            letter-spacing: 4px;
            margin-bottom: 2rem;
            background: rgba(255, 45, 149, 0.1);
        }

        h1 {
            font-family: 'Orbitron', sans-serif;
            font-size: clamp(3rem, 12vw, 7rem);
            line-height: 0.85;
            background: linear-gradient(to bottom, #fff, var(--secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 1rem;
            filter: drop-shadow(0 0 15px rgba(255, 45, 149, 0.4));
        }

        .slogan {
            font-size: clamp(1rem, 4vw, 1.4rem);
            color: #94a3b8;
            max-width: 600px;
            letter-spacing: 2px;
            text-transform: uppercase;
            font-weight: 300;
        }

        /* --- BUTTONS --- */
        .cta {
            margin-top: 3.5rem;
            display: flex;
            gap: 1.5rem;
            flex-wrap: wrap;
            justify-content: center;
        }

        .btn {
            padding: 1.2rem 2.5rem;
            font-family: 'Orbitron', sans-serif;
            font-size: 0.75rem;
            font-weight: 900;
            letter-spacing: 2px;
            text-transform: uppercase;
            text-decoration: none;
            transition: 0.3s;
            position: relative;
        }

        .btn-fill {
            background: linear-gradient(45deg, var(--primary), var(--secondary));
            color: white;
            box-shadow: 0 0 20px rgba(255, 45, 149, 0.4);
            border: none;
        }

        .btn-outline {
            border: 1px solid #1e293b;
            color: white;
        }

        .btn:hover { transform: translateY(-3px) scale(1.05); }
        .btn-outline:hover { border-color: var(--accent); box-shadow: 0 0 15px var(--accent); }

        /* --- FOOTER STATUS --- */
        .status-bar {
            padding: 2rem 5%;
            display: flex;
            justify-content: center;
            gap: 3rem;
            z-index: 100;
            flex-wrap: wrap;
        }

        .stat { display: flex; align-items: center; gap: 8px; font-size: 0.75rem; letter-spacing: 1px; color: #475569; }
        .stat b { color: white; text-transform: uppercase; }
        .dot { width: 6px; height: 6px; border-radius: 50%; }
        .green { background: #22c55e; box-shadow: 0 0 8px #22c55e; }
        .yellow { background: #eab308; box-shadow: 0 0 8px #eab308; }

        /* Mobile Optimization */
        @media (max-width: 768px) {
            .nav-links { display: none; }
            .hero { text-align: left; align-items: flex-start; }
            .cta { width: 100%; flex-direction: column; }
            .btn { text-align: center; }
            .status-bar { justify-content: flex-start; gap: 1rem; }
        }
    </style>
</head>
<body>

    <div class="scanlines"></div>
    <div class="grid-floor"></div>

    <nav>
        <div class="logo">NOVA SYNDICATE</div>
        <div class="nav-links">
            <a href="#" class="active">Home</a>
            <a href="#">Network</a>
            <a href="#">Status</a>
        </div>
    </nav>

    <main class="hero">
        <div class="badge">✦ OFFICIAL NETWORK // EST 2026</div>
        <h1>NOVA<br>SYNDICATE</h1>
        <p class="slogan">We don’t play the game — we light it up.</p>
        
        <div class="cta">
            <a href="https://discord.gg/YOUR_INVITE" class="btn btn-fill">Join Discord</a>
            <a href="#" class="btn btn-outline">Review Team</a>
        </div>
    </main>

    <footer class="status-bar">
        <div class="stat"><div class="dot green"></div> DISCORD <b>Online</b></div>
        <div class="stat"><div class="dot yellow"></div> MEMBERS <b>1.2k+</b></div>
        <div class="stat"><div class="dot green"></div> SYSTEM <b>Stable</b></div>
    </footer>

</body>
</html>
