<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NOVA SYNDICATE | WE LIGHT IT UP</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&family=Rajdhani:wght@300;500;700&display=swap');

        :root {
            --primary: #ff2d95;
            --secondary: #9d50bb;
            --accent: #00f2ff;
            --bg: #050508;
        }

        * { 
            margin: 0; 
            padding: 0; 
            box-sizing: border-box; 
            cursor: none !important; /* Custom Cursor enabled */
        }

        body {
            background-color: var(--bg);
            color: white;
            font-family: 'Rajdhani', sans-serif;
            overflow: hidden;
            height: 100vh;
            perspective: 1000px;
        }

        /* --- CUSTOM CROSSHAIR CURSOR --- */
        #cursor {
            width: 20px;
            height: 20px;
            border: 1px solid var(--accent);
            position: fixed;
            pointer-events: none;
            z-index: 9999;
            transition: transform 0.1s ease;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        #cursor::before { content: ''; width: 1px; height: 30px; background: var(--accent); position: absolute; }
        #cursor::after { content: ''; width: 30px; height: 1px; background: var(--accent); position: absolute; }

        /* --- ANIMATED ATMOSPHERE --- */
        .scanlines {
            position: fixed;
            inset: 0;
            background: linear-gradient(to bottom, transparent 50%, rgba(0, 0, 0, 0.3) 50%);
            background-size: 100% 4px;
            z-index: 50;
            pointer-events: none;
        }

        .grid-floor {
            position: fixed;
            bottom: -200px;
            left: -50%;
            width: 200%;
            height: 100%;
            background-image: 
                linear-gradient(var(--secondary) 1px, transparent 1px),
                linear-gradient(90deg, var(--secondary) 1px, transparent 1px);
            background-size: 60px 60px;
            transform: rotateX(70deg);
            opacity: 0.15;
            animation: moveGrid 15s linear infinite;
        }

        @keyframes moveGrid {
            from { background-position: 0 0; }
            to { background-position: 0 100%; }
        }

        /* --- CONTENT WRAPPER --- */
        nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 40px 10%;
            z-index: 100;
            position: relative;
        }

        .logo {
            font-family: 'Orbitron', sans-serif;
            font-size: 1.5rem;
            font-weight: 900;
            letter-spacing: 5px;
            text-shadow: 0 0 15px var(--primary);
        }

        .hero {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 70vh;
            text-align: center;
            z-index: 10;
            position: relative;
        }

        .badge {
            font-family: 'Orbitron', sans-serif;
            color: var(--accent);
            border: 1px solid var(--accent);
            padding: 5px 15px;
            font-size: 0.7rem;
            letter-spacing: 3px;
            margin-bottom: 20px;
            box-shadow: 0 0 15px rgba(0, 242, 255, 0.2);
        }

        h1 {
            font-family: 'Orbitron', sans-serif;
            font-size: 6rem;
            text-transform: uppercase;
            line-height: 0.85;
            margin-bottom: 10px;
            background: linear-gradient(to bottom, #fff, var(--primary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 0 30px rgba(255, 45, 149, 0.3));
        }

        .slogan {
            font-size: 1.4rem;
            font-weight: 700;
            letter-spacing: 6px;
            text-transform: uppercase;
            color: #fff;
            margin-top: 10px;
            opacity: 0.8;
            animation: shimmer 3s infinite;
        }

        @keyframes shimmer {
            0%, 100% { text-shadow: 0 0 5px var(--accent); opacity: 0.5; }
            50% { text-shadow: 0 0 20px var(--accent); opacity: 1; }
        }

        /* --- BUTTONS --- */
        .btn-box {
            margin-top: 50px;
            display: flex;
            gap: 25px;
        }

        .btn {
            background: transparent;
            border: 1px solid white;
            color: white;
            padding: 15px 40px;
            font-family: 'Orbitron', sans-serif;
            font-size: 0.8rem;
            letter-spacing: 3px;
            transition: 0.3s;
            position: relative;
            overflow: hidden;
        }

        .btn::after {
            content: '';
            position: absolute;
            top: 0; left: -100%;
            width: 100%; height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.4), transparent);
            transition: 0.5s;
        }

        .btn:hover::after { left: 100%; }

        .btn:hover {
            background: white;
            color: black;
            box-shadow: 0 0 30px white;
        }

        .btn-glow {
            border-color: var(--primary);
            color: var(--primary);
        }

        .btn-glow:hover {
            background: var(--primary);
            color: white;
            box-shadow: 0 0 30px var(--primary);
        }

        /* --- BOTTOM STATUS --- */
        .footer-line {
            position: fixed;
            bottom: 30px;
            width: 100%;
            display: flex;
            justify-content: center;
            gap: 60px;
            font-size: 0.8rem;
            color: #444;
        }

        .footer-line b { color: var(--accent); text-shadow: 0 0 5px var(--accent); }

    </style>
</head>
<body>

    <div id="cursor"></div>
    <div class="scanlines"></div>
    <div class="grid-floor"></div>

    <nav>
        <div class="logo">NOVA // SYNDICATE</div>
    </nav>

    <div class="hero">
        <div class="badge">EST 2026 // AUTHORIZED ACCESS ONLY</div>
        <h1>NOVA<br>SYNDICATE</h1>
        <p class="slogan">WE DON’T PLAY THE GAME — WE LIGHT IT UP</p>

        <div class="btn-box">
            <button class="btn btn-glow">ENTRY PORTAL</button>
            <button class="btn">DATABASE</button>
        </div>
    </div>

    <div class="footer-line">
        <span>STATION: <b>ACTIVE</b></span>
        <span>LATENCY: <b>14MS</b></span>
        <span>LOAD: <b>0.04%</b></span>
    </div>

    <script>
        const cursor = document.getElementById('cursor');
        document.addEventListener('mousemove', e => {
            cursor.style.left = e.clientX - 10 + 'px';
            cursor.style.top = e.clientY - 10 + 'px';
        });

        // Click effect
        document.addEventListener('mousedown', () => cursor.style.transform = 'scale(0.8)');
        document.addEventListener('mouseup', () => cursor.style.transform = 'scale(1)');
    </script>

</body>
</html>
