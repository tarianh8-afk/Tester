<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NOVA SYNDICATE | ELITE</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&family=Space+Grotesk:wght@300;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #ff2d95;
            --bg: #08080c;
            --glass: rgba(255, 255, 255, 0.03);
            --border: rgba(255, 255, 255, 0.1);
            --text-dim: #94a3b8;
        }

        /* Prevent scrolling issues on mobile */
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: var(--bg);
            color: white;
            font-family: 'Inter', sans-serif;
            overflow-x: hidden;
        }

        /* --- BACKGROUND (Lowest Layer) --- */
        .bg-animate {
            position: fixed;
            inset: 0;
            z-index: 1; /* Low z-index */
            background: 
                radial-gradient(circle at 50% 50%, rgba(255, 45, 149, 0.05) 0%, transparent 50%),
                linear-gradient(var(--border) 1px, transparent 1px) 0 0 / 40px 40px,
                linear-gradient(90deg, var(--border) 1px, transparent 1px) 0 0 / 40px 40px;
            mask-image: radial-gradient(ellipse at center, black, transparent 90%);
            pointer-events: none;
        }

        /* --- CONTENT WRAPPER (High Layer) --- */
        .wrapper {
            position: relative;
            z-index: 10; /* Keeps everything above the BG */
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1rem 5%;
            height: 70px;
            border-bottom: 1px solid var(--border);
            background: rgba(8, 8, 12, 0.8);
            backdrop-filter: blur(10px);
        }

        .logo {
            font-family: 'Space Grotesk', sans-serif;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .logo span { color: var(--primary); }

        main {
            flex: 1;
            padding: 2rem 5%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
        }

        .kicker {
            color: var(--primary);
            font-size: 0.7rem;
            letter-spacing: 4px;
            text-transform: uppercase;
            margin-bottom: 1rem;
        }

        h1 {
            font-family: 'Space Grotesk', sans-serif;
            font-size: clamp(2.5rem, 12vw, 6rem);
            line-height: 0.9;
            margin-bottom: 1.5rem;
            font-weight: 700;
        }

        .slogan {
            font-size: clamp(0.9rem, 4vw, 1.2rem);
            color: var(--text-dim);
            max-width: 500px;
            margin-bottom: 2.5rem;
        }

        /* --- BUTTONS (Fixed for Mobile) --- */
        .actions {
            display: flex;
            gap: 1rem;
            width: 100%;
            max-width: 400px;
            justify-content: center;
            flex-wrap: wrap; /* Allows stacking on small phones */
        }

        .btn {
            flex: 1; /* Buttons take equal width */
            min-width: 160px; /* Prevents them from getting too skinny */
            padding: 1.2rem;
            font-size: 0.8rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 2px;
            text-decoration: none;
            border-radius: 4px;
            transition: 0.3s;
            text-align: center;
            display: inline-block;
        }

        .btn-main {
            background: white;
            color: black;
            border: 1px solid white;
        }

        .btn-sec {
            background: rgba(255, 255, 255, 0.05);
            color: white;
            border: 1px solid var(--border);
        }

        .btn:active { transform: scale(0.95); } /* Touch feedback */

        /* --- HUD FOOTER --- */
        footer {
            padding: 1.5rem 5%;
            border-top: 1px solid var(--border);
            display: flex;
            justify-content: space-around;
            background: rgba(0,0,0,0.4);
            font-size: 0.7rem;
        }

        .stat span { color: var(--primary); font-weight: bold; }

        /* --- MOBILE SPECIFIC FIXES --- */
        @media (max-width: 480px) {
            main { padding-top: 40px; justify-content: flex-start; }
            h1 { margin-top: 20px; }
