<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NOVA SYNDICATE | Professional</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;500;800&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #030303;
            --accent: #ff2d95;
            --text-main: #ffffff;
            --text-dim: #888888;
            --border: rgba(255, 255, 255, 0.1);
            --nav-height: 80px;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background-color: var(--bg);
            color: var(--text-main);
            font-family: 'Inter', sans-serif;
            line-height: 1.6;
            -webkit-font-smoothing: antialiased;
            overflow-x: hidden;
        }

        /* --- NAVIGATION --- */
        nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 5%;
            height: var(--nav-height);
            border-bottom: 1px solid var(--border);
            position: fixed;
            top: 0; width: 100%;
            background: rgba(3, 3, 3, 0.8);
            backdrop-filter: blur(15px);
            z-index: 1000;
        }

        .logo {
            font-family: 'Space Grotesk', sans-serif;
            font-weight: 700;
            font-size: 1.1rem;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .logo-dot {
            width: 8px; height: 8px;
            background: var(--accent);
            box-shadow: 0 0 10px var(--accent);
        }

        .nav-links { display: flex; gap: 2rem; }
        .nav-links a {
            text-decoration: none;
            color: var(--text-dim);
            font-size: 0.9rem;
            transition: 0.3s;
        }

        /* Mobile Menu Toggle */
        .menu-toggle { display: none; flex-direction: column; gap: 5px; cursor: pointer; }
        .menu-toggle span { width: 25px; height: 2px; background: white; }

        /* --- HERO SECTION --- */
        .hero {
            padding: calc(var(--nav-height) + 60px) 5% 60px;
            max-width: 1200px;
            margin: 0 auto;
            text-align: center;
            min-height: 90vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .kicker {
            color: var(--accent);
            font-size: 0.75rem;
            letter-spacing: 4px;
            font-weight: 800;
            margin-bottom: 1.5rem;
            text-transform: uppercase;
        }

        h1 {
            font-family: 'Space Grotesk', sans-serif;
            font-size: clamp(2.5rem, 10vw, 6rem);
            font-weight: 700;
            line-height: 1;
            margin-bottom: 1.5rem;
            letter-spacing: -2px;
        }

        .slogan {
            color: var(--text-dim);
            font-size: clamp(1rem, 4vw, 1.25rem);
            max-width: 650px;
            margin: 0 auto 3rem;
        }

        /* --- BUTTONS --- */
        .cta-group {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 1rem;
        }

        .btn {
            padding: 1rem 2.5rem;
            border-radius: 4px;
            font-weight: 600;
            text-decoration: none;
            transition: 0.3s;
            text-align: center;
            width: auto;
        }

        .btn-primary { background: white; color: black; }
        .btn-secondary { border: 1px solid var(--border); color: white; }

        /* --- METRICS GRID --- */
        .metrics {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 2rem;
            margin-top: 5rem;
            padding-top: 4rem;
            border-top: 1px solid var(--border);
        }

        .metric-card h3 { font-family: 'Space Grotesk', sans-serif; font-size: 2.5rem; }
        .metric-card p { color: var(--text-dim); font-size: 0.75rem; text-transform: uppercase; }

        /* --- MOBILE ADJUSTMENTS --- */
        @media (max-width: 768px) {
            .nav-links { display: none; } /* Simplified for this demo */
            .menu-toggle { display: flex; }
            .hero { padding-top: 120px; text-align: left; align-items: flex-start; }
            .cta-group { justify-content: flex-start; width: 100%; }
            .btn { width: 100%; } /* Stack buttons on mobile */
            .slogan { margin-left: 0; }
        }
    </style>
</head>
<body>

    <nav>
        <div class="logo">
            <div class="logo-dot"></div>
            NOVA SYNDICATE
        </div>
        <div class="nav-links">
            <a href="#">Network</a>
            <a href="#">Status</a>
            <a href="#">Portal</a>
        </div>
        <div class="menu-toggle">
            <span></span>
            <span></span>
        </div>
    </nav>

    <section class="hero">
        <span class="kicker">Established 2026</span>
        <h1>NOVA<br>SYNDICATE</h1>
        <p class="slogan">We don’t play the game — we light it up. Access the premier collective of digital innovators.</p>
        
        <div class="cta-group">
            <a href="#" class="btn btn-primary">Join Discord</a>
            <a href="#" class="btn btn-secondary">Our Team</a>
        </div>

        <div class="metrics">
            <div class="metric-card">
                <h3>1.2k</h3>
                <p>Global Members</p>
            </div>
            <div class="metric-card">
                <h3>14ms</h3>
                <p>Network Latency</p>
            </div>
            <div class="metric-card">
                <h3>99%</h3>
                <p>Success Rate</p>
            </div>
        </div>
    </section>

</body>
</html>
